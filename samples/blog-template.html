<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{.Title}}</title>
  <meta name="description" content="{Description}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@100;300;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./article.css">
</head>

<body>
  <main class="page">
    <div class="shell">
      <header class="hero">
        <div class="hero-grid">
          <div>
            <div class="meta" aria-label="Article metadata">
              <span>{Date}</span>
              <span>{Author}</span>
              <span>{Language}</span>
            </div>
            <h1>{{.Title}}</h1>
            <p class="hero-intro">{Description}</p>
          </div>
          <figure class="cover">
            <img src="{CoverImage}" alt="{CoverImageCaption}" loading="lazy">
            <figcaption>{CoverImageCaption}</figcaption>
          </figure>
        </div>
      </header>

      <div class="article-wrap">
        <article class="content">
          {{.Content}}
        </article>
      </div>

      <footer class="footer">
        <div class="footer-inner">
          <p>{PageFooter}</p>
        </div>
      </footer>
    </div>
  </main>

</body>

</html>
